<!DOCTYPE html>

<html>

Dashboard
</title>

</head>



<body>

<main class="dashboard-page">

<section class="dashboard-grid">

<div id="statistics"></div>


<div id="activity"></div>

</main>



<script src="../js/navigation.js"></script>


<script>


fetch("../components/agentCard.html")

.then(r=>r.text())

.then(d=>agentCards.innerHTML=d);



fetch("../components/statisticsCard.html")

.then(r=>r.text())

.then(d=>statistics.innerHTML=d);



fetch("../components/activityCard.html")

.then(r=>r.text())

fetch("../components/navigationCard.html")

.then(r=>r.text())

.then(d=>quickNavigation.innerHTML=d);
